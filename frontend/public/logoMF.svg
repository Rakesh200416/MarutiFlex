<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0a0a0a" rx="12"/>
  
  <!-- Orange "M" -->
  <g fill="#FF6A2B">
    <!-- Left vertical bar of M -->
    <rect x="30" y="50" width="20" height="100" rx="3"/>
    <!-- Right vertical bar of M -->
    <rect x="100" y="50" width="20" height="100" rx="3"/>
    <!-- Center peak of M -->
    <polygon points="50,50 65,85 80,50" fill="#FF6A2B"/>
  </g>
  
  <!-- Orange "F" -->
  <g fill="#FF914D">
    <!-- Vertical bar of F -->
    <rect x="130" y="50" width="20" height="100" rx="3"/>
    <!-- Top horizontal bar of F -->
    <rect x="130" y="50" width="50" height="20" rx="3"/>
    <!-- Middle horizontal bar of F -->
    <rect x="130" y="95" width="40" height="18" rx="3"/>
  </g>
</svg>
